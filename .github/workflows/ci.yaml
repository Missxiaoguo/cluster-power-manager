name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - LICENSE
      - OWNERS
      - OWNERS_ALIASES
      - .gitignore
      - docs/**
      - hack/**
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - LICENSE
      - OWNERS
      - OWNERS_ALIASES
      - .gitignore
      - docs/**
      - hack/**

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Generate, build CRDs, and run unit and integration tests
        run: make test

  images:
    name: Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 20
    env:
      REGISTRY: ghcr.io
      OPERATOR_IMAGE: ghcr.io/missxiaoguo/cluster-power-manager-operator
      AGENT_IMAGE: ghcr.io/missxiaoguo/cluster-power-node-agent
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Log in to ghcr.io
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: ${{ github.event_name == 'push' && 'Build and push operator image' || 'Build operator image' }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: build/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.OPERATOR_IMAGE }}:latest
      - name: ${{ github.event_name == 'push' && 'Build and push agent image' || 'Build agent image' }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: build/Dockerfile.nodeagent
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.AGENT_IMAGE }}:latest
