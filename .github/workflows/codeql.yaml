# CodeQL scans Go source code for security vulnerabilities (e.g., injection,
# path traversal). Results appear in the repo's Security tab under
# "Code scanning alerts".
name: "CodeQL Scan"

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    if: github.repository == 'cluster-power-manager/cluster-power-manager'
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Initialize CodeQL
        uses: github/codeql-action/init@53e96ec3b35fce51c141c0d6f0e31028a448722d # v3.35.3
        with:
          languages: go
      - name: Autobuild
        uses: github/codeql-action/autobuild@53e96ec3b35fce51c141c0d6f0e31028a448722d # v3.35.3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@53e96ec3b35fce51c141c0d6f0e31028a448722d # v3.35.3
        with:
          category: "/language:go"
